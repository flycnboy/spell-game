<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>语音测试</title></head>
<body style="text-align:center;padding-top:100px;font-family:sans-serif;">
  <h2>Web Speech API 测试</h2>
  <button onclick="speak()" style="font-size:80px;border:none;background:none;">🔊</button>
  <p id="msg" style="font-size:20px;margin-top:20px;"></p>
  <script>
    function speak() {
      const msg = document.getElementById('msg');
      if (!window.speechSynthesis) {
        msg.innerText = '❌ 浏览器不支持 Speech API';
        return;
      }
      const u = new SpeechSynthesisUtterance('hello');
      u.lang = 'en-US';
      u.rate = 0.7;
      u.onerror = (e) => msg.innerText = '❌ 错误: ' + e.error;
      u.onstart = () => msg.innerText = '✅ 正在朗读 "hello"';
      speechSynthesis.speak(u);
    }
  </script>
</body>
</html>
